<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Task Tracker</title>
<style>
  :root {
    --ground: #F9F9F6;
    --surface: #FFFFFF;
    --text: #2A2A2E;
    --text-secondary: #7C7C82;
    --text-tertiary: #A8A8AC;
    --border: #E6E6E2;
    --border-light: #F0F0EC;
    --accent: #4A6FA5;
    --accent-hover: #3D5E8C;
    --priority-high: #C45240;
    --priority-high-bg: #C4524012;
    --priority-medium: #C89B2A;
    --priority-medium-bg: #C89B2A12;
    --priority-low: #6B956B;
    --priority-low-bg: #6B956B12;
    --done-text: #B8B8BC;
    --done-line: #CCCCD0;
    --team-bg: #F2F2EE;
    --hover: #F4F4F0;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #18181B;
      --surface: #1E1E22;
      --text: #E4E4E0;
      --text-secondary: #8E8E92;
      --text-tertiary: #5A5A5E;
      --border: #2E2E32;
      --border-light: #262628;
      --accent: #6B8FC4;
      --accent-hover: #7DA0D0;
      --priority-high: #D4705F;
      --priority-high-bg: #D4705F18;
      --priority-medium: #D4AD4A;
      --priority-medium-bg: #D4AD4A18;
      --priority-low: #7DAF7D;
      --priority-low-bg: #7DAF7D18;
      --done-text: #4A4A4E;
      --done-line: #3A3A3E;
      --team-bg: #222226;
      --hover: #24242A;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ground);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .setup-banner {
    background: var(--priority-high-bg);
    border: 1px solid var(--priority-high);
    border-radius: 3px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }
  .setup-banner code {
    background: var(--team-bg);
    padding: 1px 4px;
    border-radius: 2px;
    font-size: 12px;
  }

  .sync-status {
    font-size: 11px;
    letter-spacing: 0.03em;
  }
  .sync-status.connected { color: var(--priority-low); }
  .sync-status.offline { color: var(--priority-high); }
  .sync-status.syncing { color: var(--priority-medium); }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .campaign-name {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: normal;
    color: var(--text);
    background: none;
    border: none;
    outline: none;
    padding: 0;
    width: 100%;
    max-width: 400px;
  }
  .campaign-name::placeholder { color: var(--text-tertiary); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .task-count {
    font-size: 12px;
    color: var(--text-tertiary);
    letter-spacing: 0.03em;
    font-variant-numeric: tabular-nums;
  }

  .team-section { margin-bottom: 28px; }
  .team-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    padding: 6px 0;
    color: var(--text-secondary);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .team-toggle:hover { color: var(--text); }
  .team-toggle .arrow {
    display: inline-block;
    transition: transform 0.15s ease;
    font-size: 9px;
  }
  .team-toggle .arrow.open { transform: rotate(90deg); }
  .team-avatars { display: flex; gap: 4px; margin-left: 8px; }
  .team-avatar-small {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--team-bg); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; color: var(--text-secondary);
    letter-spacing: -0.02em;
  }
  .team-panel { display: none; padding: 12px 0; }
  .team-panel.open { display: block; }
  .team-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .team-member {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px; background: var(--team-bg);
    border: 1px solid var(--border-light); border-radius: 3px;
    font-size: 13px; color: var(--text); cursor: default;
  }
  .team-member .remove {
    color: var(--text-tertiary); cursor: pointer;
    font-size: 14px; line-height: 1; padding: 0 2px;
  }
  .team-member .remove:hover { color: var(--priority-high); }
  .add-member-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
  .add-member-input {
    font-family: inherit; font-size: 13px; padding: 5px 8px;
    border: 1px solid var(--border); border-radius: 3px;
    background: var(--surface); color: var(--text); outline: none; width: 180px;
  }
  .add-member-input:focus { border-color: var(--accent); }
  .add-member-input::placeholder { color: var(--text-tertiary); }
  .add-member-btn {
    font-family: inherit; font-size: 12px; padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 3px;
    background: var(--surface); color: var(--text-secondary); cursor: pointer;
  }
  .add-member-btn:hover { border-color: var(--accent); color: var(--accent); }
  .team-limit-note { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; }

  .task-list-header {
    display: grid;
    grid-template-columns: 28px 1fr 90px 100px 80px 28px;
    gap: 8px; align-items: center; padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-tertiary); user-select: none;
  }
  .task-list-header span { cursor: pointer; }
  .task-list-header span:hover { color: var(--text-secondary); }

  .task-row {
    display: grid;
    grid-template-columns: 28px 1fr 90px 100px 80px 28px;
    gap: 8px; align-items: center; padding: 7px 0;
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s ease;
  }
  .task-row:hover { background: var(--hover); }
  .task-row.done .task-name-input { text-decoration: line-through; color: var(--done-text); }
  .task-row.done .task-due,
  .task-row.done .task-assignee-select,
  .task-row.done .task-priority-btn { opacity: 0.4; }

  .task-check {
    width: 16px; height: 16px; border: 1.5px solid var(--border);
    border-radius: 2px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease; background: transparent; margin: 0 auto;
  }
  .task-check:hover { border-color: var(--accent); }
  .task-check.checked { background: var(--accent); border-color: var(--accent); }
  .task-check.checked::after {
    content: ''; width: 8px; height: 5px;
    border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }

  .task-name-input {
    font-family: inherit; font-size: 14px; color: var(--text);
    background: none; border: none; outline: none; width: 100%; padding: 1px 0;
  }
  .task-name-input::placeholder { color: var(--text-tertiary); }

  .task-due {
    font-family: inherit; font-size: 13px; font-variant-numeric: tabular-nums;
    color: var(--text-secondary); background: none; border: none;
    outline: none; cursor: pointer; padding: 2px 0; position: relative;
  }
  .task-due::-webkit-calendar-picker-indicator {
    opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer;
  }

  .task-assignee-select {
    font-family: inherit; font-size: 13px; color: var(--text-secondary);
    background: none; border: none; outline: none; cursor: pointer;
    padding: 2px 0; appearance: none; -webkit-appearance: none;
  }
  .task-assignee-select option { background: var(--surface); color: var(--text); }

  .task-priority-btn {
    display: flex; align-items: center; gap: 4px;
    font-family: inherit; font-size: 11px; letter-spacing: 0.02em;
    padding: 2px 6px; border-radius: 2px; border: none; cursor: pointer;
    background: transparent; color: var(--text-secondary); text-transform: uppercase;
  }
  .task-priority-btn .dot { width: 6px; height: 6px; border-radius: 50%; }
  .task-priority-btn[data-priority="high"] .dot { background: var(--priority-high); }
  .task-priority-btn[data-priority="high"] { color: var(--priority-high); background: var(--priority-high-bg); }
  .task-priority-btn[data-priority="med"] .dot { background: var(--priority-medium); }
  .task-priority-btn[data-priority="med"] { color: var(--priority-medium); background: var(--priority-medium-bg); }
  .task-priority-btn[data-priority="low"] .dot { background: var(--priority-low); }
  .task-priority-btn[data-priority="low"] { color: var(--priority-low); background: var(--priority-low-bg); }

  .task-delete {
    color: var(--text-tertiary); cursor: pointer; font-size: 14px;
    text-align: center; opacity: 0; transition: opacity 0.1s;
    background: none; border: none; font-family: inherit;
  }
  .task-row:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: var(--priority-high); }

  .add-task-row { padding: 8px 0; padding-left: 36px; }
  .add-task-btn {
    font-family: inherit; font-size: 13px; color: var(--text-tertiary);
    background: none; border: none; cursor: pointer; padding: 4px 0;
  }
  .add-task-btn:hover { color: var(--accent); }

  .filter-bar {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    font-family: inherit; font-size: 12px; color: var(--text-tertiary);
    background: none; border: none; cursor: pointer; padding: 3px 0;
    border-bottom: 1.5px solid transparent; letter-spacing: 0.02em;
  }
  .filter-btn:hover { color: var(--text-secondary); }
  .filter-btn.active { color: var(--text); border-bottom-color: var(--text); }
  .filter-sep { width: 1px; height: 14px; background: var(--border); }

  .task-due.overdue { color: var(--priority-high); }

  @media (max-width: 640px) {
    .app { padding: 24px 16px 60px; }
    .task-list-header, .task-row { grid-template-columns: 24px 1fr 80px 28px; }
    .task-list-header .col-assignee, .task-list-header .col-priority,
    .task-row .task-assignee-select, .task-row .task-priority-btn { display: none; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <div id="setupBanner"></div>

  <div class="header">
    <input class="campaign-name" id="campaignName" value="" placeholder="Campaign name">
    <div class="header-right">
      <span class="sync-status" id="syncStatus"></span>
      <span class="task-count" id="taskCount"></span>
    </div>
  </div>

  <div class="team-section">
    <div class="team-toggle" id="teamToggle">
      <span class="arrow" id="teamArrow">&#9654;</span>
      <span>Team</span>
      <div class="team-avatars" id="teamAvatars"></div>
    </div>
    <div class="team-panel" id="teamPanel">
      <div class="team-list" id="teamList"></div>
      <div class="add-member-row" id="addMemberRow">
        <input class="add-member-input" id="addMemberInput" placeholder="Name" maxlength="30">
        <button class="add-member-btn" id="addMemberBtn">Add</button>
      </div>
      <div class="team-limit-note" id="teamLimitNote"></div>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-filter="high">High</button>
    <button class="filter-btn" data-filter="med">Medium</button>
    <button class="filter-btn" data-filter="low">Low</button>
  </div>

  <div class="task-list-header">
    <span></span>
    <span class="col-name">Task</span>
    <span class="col-due">Due</span>
    <span class="col-assignee">Assigned</span>
    <span class="col-priority">Priority</span>
    <span></span>
  </div>
  <div id="taskList"></div>
  <div class="add-task-row">
    <button class="add-task-btn" id="addTaskBtn">+ Add task</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
  // ============================================================
  // SUPABASE CONFIG — paste your values from Dashboard > Settings > API
  // ============================================================
  var SUPABASE_URL  = 'https://qhrtqtnrduambvchjxqw.supabase.co';
  var SUPABASE_KEY  = 'sb_publishable_UAG7Ru6PRdNnOLCbchpQVg_8vE0jG5N';
  // ============================================================

  var PRIORITIES = ['high', 'med', 'low'];
  var PRIORITY_LABELS = { high: 'High', med: 'Med', low: 'Low' };
  var currentFilter = 'all';
  var tasks = [];
  var team = [];
  var campaignName = '';
  var sb = null;
  var nameTimeout = null;

  function isConfigured() {
    return SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_KEY !== 'YOUR_ANON_KEY';
  }

  function setSyncStatus(text, cls) {
    var el = document.getElementById('syncStatus');
    el.textContent = text;
    el.className = 'sync-status ' + cls;
  }

  function escHtml(str) {
    var d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function getInitials(name) {
    return name.split(/\s+/).map(function(w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
  }

  function isOverdue(dateStr) {
    if (!dateStr) return false;
    var today = new Date();
    today.setHours(0,0,0,0);
    return new Date(dateStr + 'T00:00:00') < today;
  }

  // --- Supabase data layer ---

  async function loadAll() {
    setSyncStatus('Loading...', 'syncing');
    var r1 = await sb.from('tasks').select('*').order('id');
    var r2 = await sb.from('team_members').select('*').order('id');
    var r3 = await sb.from('campaign_settings').select('*');

    if (r1.error || r2.error || r3.error) {
      setSyncStatus('Error loading', 'offline');
      console.error(r1.error, r2.error, r3.error);
      return;
    }

    tasks = r1.data || [];
    team = (r2.data || []).map(function(m) { return m.name; });
    var settings = r3.data || [];
    var nameRow = settings.find(function(s) { return s.key === 'campaignName'; });
    campaignName = nameRow ? nameRow.value : 'Campaign';

    setSyncStatus('Synced', 'connected');
    renderAll();
  }

  function subscribeRealtime() {
    sb.channel('tracker')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, function() { reloadTasks(); })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'team_members' }, function() { reloadTeam(); })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'campaign_settings' }, function() { reloadSettings(); })
      .subscribe(function(status) {
        if (status === 'SUBSCRIBED') setSyncStatus('Live', 'connected');
      });
  }

  async function reloadTasks() {
    var r = await sb.from('tasks').select('*').order('id');
    if (!r.error) { tasks = r.data || []; renderTasks(); updateCount(); }
  }

  async function reloadTeam() {
    var r = await sb.from('team_members').select('*').order('id');
    if (!r.error) { team = (r.data || []).map(function(m) { return m.name; }); renderTeam(); renderTasks(); }
  }

  async function reloadSettings() {
    var r = await sb.from('campaign_settings').select('*');
    if (!r.error) {
      var nameRow = (r.data || []).find(function(s) { return s.key === 'campaignName'; });
      if (nameRow) {
        campaignName = nameRow.value;
        var el = document.getElementById('campaignName');
        if (document.activeElement !== el) el.value = campaignName;
      }
    }
  }

  // --- Mutations ---

  async function addTask() {
    var id = Date.now();
    var newTask = { id: id, name: '', done: false, due: '', assignee: '', priority: 'med' };
    tasks.push(newTask);
    renderTasks();
    var input = document.querySelector('.task-name-input[data-id="' + id + '"]');
    if (input) input.focus();
    await sb.from('tasks').insert(newTask);
  }

  async function updateTask(id, fields) {
    await sb.from('tasks').update(fields).eq('id', id);
  }

  async function deleteTask(id) {
    tasks = tasks.filter(function(t) { return t.id !== id; });
    renderTasks();
    updateCount();
    await sb.from('tasks').delete().eq('id', id);
  }

  async function addTeamMember(name) {
    if (!name || team.length >= 10) return;
    if (team.some(function(m) { return m.toLowerCase() === name.toLowerCase(); })) return;
    team.push(name);
    renderTeam();
    renderTasks();
    await sb.from('team_members').insert({ name: name });
  }

  async function removeTeamMember(name) {
    team = team.filter(function(m) { return m !== name; });
    renderTeam();
    tasks.forEach(function(t) { if (t.assignee === name) t.assignee = ''; });
    renderTasks();
    await sb.from('team_members').delete().eq('name', name);
    await sb.from('tasks').update({ assignee: '' }).eq('assignee', name);
  }

  async function saveCampaignName(val) {
    await sb.from('campaign_settings').upsert({ key: 'campaignName', value: val });
  }

  // --- Rendering ---

  function renderAll() {
    document.getElementById('campaignName').value = campaignName;
    renderTeam();
    renderTasks();
    updateCount();
  }

  function renderTeam() {
    var list = document.getElementById('teamList');
    var avatars = document.getElementById('teamAvatars');
    var note = document.getElementById('teamLimitNote');

    list.innerHTML = team.map(function(name, i) {
      return '<div class="team-member">' + escHtml(name) +
        ' <span class="remove" data-name="' + escHtml(name) + '">&times;</span></div>';
    }).join('');

    avatars.innerHTML = team.map(function(name) {
      return '<div class="team-avatar-small">' + getInitials(name) + '</div>';
    }).join('');

    var remaining = 10 - team.length;
    if (remaining <= 0) {
      note.textContent = '10 members maximum';
      document.getElementById('addMemberRow').style.display = 'none';
    } else {
      note.textContent = remaining + ' more slot' + (remaining !== 1 ? 's' : '');
      document.getElementById('addMemberRow').style.display = 'flex';
    }

    list.querySelectorAll('.remove').forEach(function(btn) {
      btn.addEventListener('click', function() { removeTeamMember(btn.dataset.name); });
    });
  }

  function filteredTasks() {
    return tasks.filter(function(t) {
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done') return t.done;
      if (currentFilter === 'high') return t.priority === 'high' && !t.done;
      if (currentFilter === 'med') return t.priority === 'med' && !t.done;
      if (currentFilter === 'low') return t.priority === 'low' && !t.done;
      return true;
    });
  }

  function renderTasks() {
    var container = document.getElementById('taskList');
    var visible = filteredTasks();

    container.innerHTML = visible.map(function(t) {
      var overdue = !t.done && isOverdue(t.due);
      var options = '<option value="">—</option>' +
        team.map(function(m) {
          return '<option value="' + escHtml(m) + '"' + (t.assignee === m ? ' selected' : '') + '>' + escHtml(m) + '</option>';
        }).join('');

      return '<div class="task-row' + (t.done ? ' done' : '') + '" data-id="' + t.id + '">' +
        '<div class="task-check' + (t.done ? ' checked' : '') + '" data-id="' + t.id + '"></div>' +
        '<input class="task-name-input" value="' + escHtml(t.name) + '" placeholder="Task name" data-id="' + t.id + '">' +
        '<input class="task-due' + (overdue ? ' overdue' : '') + '" type="date" value="' + (t.due || '') + '" data-id="' + t.id + '">' +
        '<select class="task-assignee-select" data-id="' + t.id + '">' + options + '</select>' +
        '<button class="task-priority-btn" data-id="' + t.id + '" data-priority="' + t.priority + '">' +
          '<span class="dot"></span>' + PRIORITY_LABELS[t.priority] + '</button>' +
        '<button class="task-delete" data-id="' + t.id + '">&times;</button>' +
      '</div>';
    }).join('');

    // Wire events
    container.querySelectorAll('.task-check').forEach(function(el) {
      el.addEventListener('click', function() {
        var task = tasks.find(function(t) { return t.id === parseInt(el.dataset.id); });
        if (task) { task.done = !task.done; renderTasks(); updateCount(); updateTask(task.id, { done: task.done }); }
      });
    });

    var nameTimers = {};
    container.querySelectorAll('.task-name-input').forEach(function(el) {
      el.addEventListener('input', function() {
        var id = parseInt(el.dataset.id);
        var task = tasks.find(function(t) { return t.id === id; });
        if (task) {
          task.name = el.value;
          clearTimeout(nameTimers[id]);
          nameTimers[id] = setTimeout(function() { updateTask(id, { name: task.name }); }, 400);
        }
      });
    });

    container.querySelectorAll('.task-due').forEach(function(el) {
      el.addEventListener('change', function() {
        var task = tasks.find(function(t) { return t.id === parseInt(el.dataset.id); });
        if (task) { task.due = el.value; renderTasks(); updateTask(task.id, { due: task.due }); }
      });
    });

    container.querySelectorAll('.task-assignee-select').forEach(function(el) {
      el.addEventListener('change', function() {
        var task = tasks.find(function(t) { return t.id === parseInt(el.dataset.id); });
        if (task) { task.assignee = el.value; updateTask(task.id, { assignee: task.assignee }); }
      });
    });

    container.querySelectorAll('.task-priority-btn').forEach(function(el) {
      el.addEventListener('click', function() {
        var task = tasks.find(function(t) { return t.id === parseInt(el.dataset.id); });
        if (task) {
          var idx = PRIORITIES.indexOf(task.priority);
          task.priority = PRIORITIES[(idx + 1) % PRIORITIES.length];
          renderTasks();
          updateTask(task.id, { priority: task.priority });
        }
      });
    });

    container.querySelectorAll('.task-delete').forEach(function(el) {
      el.addEventListener('click', function() { deleteTask(parseInt(el.dataset.id)); });
    });
  }

  function updateCount() {
    var active = tasks.filter(function(t) { return !t.done; }).length;
    document.getElementById('taskCount').textContent = active + ' active / ' + tasks.length + ' total';
  }

  // --- Event listeners ---

  document.getElementById('teamToggle').addEventListener('click', function() {
    var panel = document.getElementById('teamPanel');
    var arrow = document.getElementById('teamArrow');
    var isOpen = panel.classList.toggle('open');
    arrow.classList.toggle('open', isOpen);
  });

  function handleAddMember() {
    var input = document.getElementById('addMemberInput');
    var name = input.value.trim();
    input.value = '';
    addTeamMember(name);
  }
  document.getElementById('addMemberBtn').addEventListener('click', handleAddMember);
  document.getElementById('addMemberInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleAddMember();
  });

  document.getElementById('addTaskBtn').addEventListener('click', addTask);

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderTasks();
    });
  });

  document.getElementById('campaignName').addEventListener('input', function(e) {
    campaignName = e.target.value;
    clearTimeout(nameTimeout);
    nameTimeout = setTimeout(function() { saveCampaignName(campaignName); }, 500);
  });

  // --- Init ---

  if (!isConfigured()) {
    document.getElementById('setupBanner').innerHTML =
      '<div class="setup-banner">' +
        '<strong>Supabase not configured.</strong> Paste your project URL and anon key into ' +
        '<code>index.html</code> and run <code>setup.sql</code> in the SQL Editor.' +
      '</div>';
    setSyncStatus('Not configured', 'offline');
    tasks = [
      { id: 1, name: 'Finalize yard sign locations', done: false, due: '2026-07-28', assignee: 'Jordan', priority: 'high' },
      { id: 2, name: 'Schedule candidate forum prep', done: false, due: '2026-07-25', assignee: 'Alex', priority: 'high' },
      { id: 3, name: 'Draft volunteer call script', done: false, due: '2026-07-30', assignee: 'Morgan', priority: 'med' },
      { id: 4, name: 'Update social media calendar', done: false, due: '2026-07-23', assignee: 'Sam', priority: 'med' },
      { id: 5, name: 'Order campaign mailers', done: true, due: '2026-07-20', assignee: 'Jordan', priority: 'low' },
      { id: 6, name: 'Confirm rally venue', done: false, due: '2026-08-02', assignee: 'Alex', priority: 'high' },
    ];
    team = ['Jordan', 'Alex', 'Morgan', 'Sam'];
    campaignName = 'City Council 2026';
    renderAll();
  } else {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    loadAll().then(subscribeRealtime);
  }
</script>
</body>
</html>
